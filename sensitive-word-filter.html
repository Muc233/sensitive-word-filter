<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>微信敏感词过滤工具</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);

    padding: 20px;
  }

  .header {
    text-align: center;
    color: white;
    margin-bottom: 24px;
  }
  .header h1 { font-size: 28px; margin-bottom: 8px; }
  .header p { opacity: 0.9; font-size: 14px; }

  .container {
    display: flex;
    gap: 20px;
    max-width: 1400px;
    margin: 0 auto;
    height: calc(100vh - 140px);
    min-height: 500px;
  }

  .panel {
    flex: 1;
    background: white;
    border-radius: 16px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.15);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .panel-header {
    padding: 16px 20px;
    background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
    border-bottom: 1px solid #e0e0e0;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .panel-header h2 { font-size: 16px; color: #333; }
  .panel-header .badge {
    background: #667eea;
    color: white;
    padding: 2px 10px;
    border-radius: 12px;
    font-size: 12px;
  }

  .rich-editor {
    flex: 1;
    padding: 16px;
    outline: none;
    overflow-y: auto;
    font-size: 15px;
    line-height: 1.8;
    color: #333;
    border: none;
    min-height: 200px;
    white-space: pre-wrap;
    word-wrap: break-word;
  }
  .rich-editor:empty::before {
    content: '在此输入或粘贴需要过滤的文字...';
    color: #999;
  }

  .result-area {
    flex: 1;
    padding: 16px;
    overflow-y: auto;
    font-size: 15px;
    line-height: 1.8;
    color: #333;
    white-space: pre-wrap;
    word-wrap: break-word;
  }

  .highlight-high {
    background: linear-gradient(120deg, #ff6b6b 0%, #ee5a24 100%);
    color: white;
    padding: 2px 4px;
    border-radius: 4px;
    font-weight: 600;
    position: relative;
    cursor: pointer;
  }
  .highlight-high:hover::after {
    content: '高危词已处理';
    position: absolute;
    bottom: 100%;
    left: 50%;
    transform: translateX(-50%);
    background: #333;
    color: white;
    padding: 4px 8px;
    border-radius: 4px;
    font-size: 12px;
    white-space: nowrap;
    z-index: 10;
  }

  .highlight-low {
    background: linear-gradient(120deg, #feca57 0%, #ff9f43 100%);
    color: #333;
    padding: 2px 4px;
    border-radius: 4px;
    font-weight: 600;
    position: relative;
    cursor: pointer;
  }
  .highlight-low:hover::after {
    content: '低风险词已处理';
    position: absolute;
    bottom: 100%;
    left: 50%;
    transform: translateX(-50%);
    background: #333;
    color: white;
    padding: 4px 8px;
    border-radius: 4px;
    font-size: 12px;
    white-space: nowrap;
    z-index: 10;
  }

  .highlight-replace {
    background: linear-gradient(120deg, #48dbfb 0%, #0abde3 100%);
    color: white;
    padding: 2px 4px;
    border-radius: 4px;
    font-weight: 600;
    position: relative;
    cursor: pointer;
  }
  .highlight-replace:hover::after {
    content: '已替换为同义词';
    position: absolute;
    bottom: 100%;
    left: 50%;
    transform: translateX(-50%);
    background: #333;
    color: white;
    padding: 4px 8px;
    border-radius: 4px;
    font-size: 12px;
    white-space: nowrap;
    z-index: 10;
  }

  .toolbar {
    display: flex;
    gap: 8px;
    padding: 12px 16px;
    background: #f8f9fa;
    border-top: 1px solid #e0e0e0;
    align-items: center;
    flex-wrap: wrap;
  }

  .btn {
    padding: 8px 16px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-size: 14px;
    font-weight: 600;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 6px;

  .btn-primary {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);

  .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(102,126,234,0.4); }

    background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);

  .btn-success:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(56,239,125,0.4); }

  .btn-warning {
    background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);

  .btn-warning:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(245,87,108,0.4); }

  .btn-secondary {
    background: #6c757d;

    display: flex;

    font-size: 13px;

  }
  .stat-item { display: flex; align-items: center; gap: 4px; }
  .stat-dot { width: 8px; height: 8px; border-radius: 50%; }

  .legend {
    display: flex;
    gap: 12px;
    padding: 8px 16px;
    background: #f8f9fa;
    border-top: 1px solid #e0e0e0;
    font-size: 12px;
    color: #666;
    flex-wrap: wrap;
  }
  .legend-item { display: flex; align-items: center; gap: 4px; }

    background: rgba(0,0,0,0.5);

    align-items: center;
    justify-content: center;

  .modal-content {

    border-radius: 16px;

    max-width: 600px;

  .toast-success { background: #38ef7d; }
  .toast-error { background: #f5576c; }

    width: 4px;
    background: linear-gradient(180deg, #667eea 0%, #764ba2 100%);

  }

    .container { flex-direction: column; height: auto; }
    .panel { min-height: 300px; }
    .divider { width: 100%; height: 4px; }
  }

<body>

<div class="header">
  <h1>🛡️ 微信敏感词过滤工具</h1>
  <p>智能识别并替换风险词汇，保护你的内容安全</p>
</div>

<div class="container">
  <!-- 左侧：输入区域 -->
  <div class="panel" id="inputPanel">
    <div class="panel-header">
      <h2>📝 原文编辑区</h2>
      <span class="badge" id="inputCount">0 字</span>
    </div>
    <div class="rich-editor" id="inputArea" contenteditable="true"></div>
    <div class="toolbar">
      <button class="btn btn-warning" onclick="clearAll()">🗑️ 清空</button>
      <button class="btn btn-secondary" onclick="loadExample()">📋 加载示例</button>
      <div class="stats">
        <div class="stat-item"><span class="stat-dot" style="background:#ff6b6b"></span> 高危: <strong id="highCount">0</strong></div>
        <div class="stat-item"><span class="stat-dot" style="background:#feca57"></span> 低风险: <strong id="lowCount">0</strong></div>
        <div class="stat-item"><span class="stat-dot" style="background:#48dbfb"></span> 已替换: <strong id="replaceCount">0</strong></div>
      </div>
    </div>
  </div>

  <div class="divider" id="divider"></div>

  <!-- 右侧：结果区域 -->
  <div class="panel" id="outputPanel">
    <div class="panel-header">
      <h2>✅ 过滤结果区</h2>
      <span class="badge" id="outputCount">0 字</span>
    </div>
    <div class="result-area" id="outputArea"></div>
    <div class="legend">
      <div class="legend-item"><span class="highlight-high" style="padding:2px 6px">红色</span> 高危词处理（加`打断）</div>
      <div class="legend-item"><span class="highlight-low" style="padding:2px 6px">橙色</span> 低风险词处理（加空格）</div>
      <div class="legend-item"><span class="highlight-replace" style="padding:2px 6px">蓝色</span> 同义词替换</div>
    </div>
    <div class="toolbar">
      <button class="btn btn-primary" onclick="copyResult()">📋 复制结果</button>
      <button class="btn btn-success" onclick="exportText()">💾 导出文本</button>
      <button class="btn btn-secondary" onclick="showDetail()">📊 查看详情</button>
    </div>
  </div>
</div>

<!-- 详情弹窗 -->
<div class="modal" id="detailModal">
  <div class="modal-content">
    <h3>🔍 过滤详情报告</h3>
    <div id="detailContent"></div>
    <br>
    <button class="btn btn-primary" onclick="closeDetail()" style="width:100%">关闭</button>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ==================== 敏感词库 ====================

// 所有敏感词统一数组，按长度降序排列（长词优先）
// type: 'high' = 高危（加`打断），'low' = 低风险（加空格），'replace' = 同义词替换
const ALL_PATTERNS = [
  // ---------- 多词组合（长词优先匹配）----------
  { word: '金融诈骗嫌疑', replacement: null, type: 'high' },
  { word: '满分状元学霸', replacement: '优秀学生', type: 'replace' },
  { word: '金融诈骗', replacement: null, type: 'high' },
  { word: '支付宝转账', replacement: null, type: 'high' },
  { word: '最好第一', replacement: '优质领先', type: 'replace' },
  { word: '顶级王牌', replacement: '优质精选', type: 'replace' },
  { word: '满分状元', replacement: '高分优秀学生', type: 'replace' },
  { word: '提分学霸', replacement: '提升成绩', type: 'replace' },
  { word: '炒股理财', replacement: null, type: 'low' },
  { word: '投资理财', replacement: null, type: 'low' },
  { word: '政府官方', replacement: null, type: 'replace' },

  // ---------- 4字词 ----------
  { word: '优惠券', replacement: '优 惠 券', type: 'low' },
  { word: '高收入', replacement: '高 收 入', type: 'low' },
  { word: '我靠', replacement: null, type: 'high' },
  { word: '卧槽', replacement: null, type: 'high' },
  { word: '妈的', replacement: null, type: 'high' },
  { word: '傻逼', replacement: null, type: 'high' },
  { word: '滚蛋', replacement: null, type: 'high' },
  { word: '自杀', replacement: null, type: 'high' },
  { word: '跳楼', replacement: null, type: 'high' },
  { word: '空难', replacement: null, type: 'high' },
  { word: '死亡', replacement: null, type: 'high' },
  { word: '杀人', replacement: null, type: 'high' },
  { word: '白嫖', replacement: null, type: 'high' },

  // ---------- 3字词 ----------
  { word: '加微信', replacement: null, type: 'high' },
  { word: '微信号', replacement: null, type: 'high' },
  { word: '扫码加入', replacement: null, type: 'high' },
  { word: '支付宝', replacement: '支 付 宝', type: 'low' },
  { word: 'VIP', replacement: 'V I P', type: 'low' },
  { word: '证券', replacement: '证 券', type: 'low' },
  { word: '券商', replacement: '券 商', type: 'low' },
  { word: '炒股', replacement: '炒 股', type: 'low' },
  { word: '股票', replacement: '股 票', type: 'low' },
  { word: '现金', replacement: '现 金', type: 'low' },
  { word: '基金', replacement: '基 金', type: 'low' },
  { word: '红包', replacement: '红 包', type: 'low' },
  { word: '签约', replacement: '签 约', type: 'low' },
  { word: '到账', replacement: '到 账', type: 'low' },
  { word: '独立', replacement: '独 立', type: 'low' },
  { word: '自由', replacement: '自 由', type: 'low' },
  { word: '重点', replacement: '重 点', type: 'low' },
  { word: '指定', replacement: '指 定', type: 'low' },
  { word: '被迫', replacement: '被 迫', type: 'low' },
  { word: '移民', replacement: '移 民', type: 'low' },
  { word: '全网', replacement: '全 网', type: 'low' },
  { word: '赴美', replacement: '赴 美', type: 'low' },
  { word: '留美', replacement: '留 美', type: 'low' },
  { word: '下载', replacement: '下 载', type: 'low' },
  { word: '分享', replacement: '分 享', type: 'low' },
  { word: '私聊', replacement: '私 聊', type: 'low' },
  { word: '签到', replacement: '签 到', type: 'low' },
  { word: '返利', replacement: '返 利', type: 'low' },
  { word: '投资', replacement: '投 资', type: 'low' },
  { word: '理财', replacement: '理 财', type: 'low' },
  { word: '充值', replacement: '充 值', type: 'low' },
  { word: '贷款', replacement: '贷 款', type: 'low' },
  { word: '兼职', replacement: '兼 职', type: 'low' },
  { word: '会员', replacement: '会 员', type: 'low' },
  { word: '刷单', replacement: null, type: 'high' },
  { word: '套现', replacement: null, type: 'high' },
  { word: '代开', replacement: null, type: 'high' },
  { word: '转账', replacement: null, type: 'high' },
  { word: '汇款', replacement: null, type: 'high' },

  // ---------- 2字词（同义词替换）----------
  { word: '顶级', replacement: '头部', type: 'replace' },
  { word: '王牌', replacement: '精选', type: 'replace' },
  { word: '最强', replacement: '强劲', type: 'replace' },
  { word: '最新', replacement: '近期', type: 'replace' },
  { word: '最高', replacement: '至高', type: 'replace' },
  { word: '国家级', replacement: '优质', type: 'replace' },
  { word: '世界级', replacement: '国际级', type: 'replace' },
  { word: '唯一', replacement: '独一', type: 'replace' },
  { word: '独有', replacement: '特色', type: 'replace' },
  { word: '独家', replacement: '独一份', type: 'replace' },
  { word: '高效', replacement: '高质量', type: 'replace' },
  { word: '中心', replacement: '核心', type: 'replace' },
  { word: '第一', replacement: '领先', type: 'replace' },
  { word: '第二', replacement: '前列', type: 'replace' },
  { word: '最好', replacement: '极好', type: 'replace' },
  { word: '最佳', replacement: '极佳', type: 'replace' },
  { word: '最低', replacement: '至低', type: 'replace' },
  { word: '钱', replacement: 'money', type: 'replace' },
  { word: '赚', replacement: '获得', type: 'replace' },
  { word: '盈利', replacement: '收益', type: 'replace' },
  { word: '满分', replacement: '高分', type: 'replace' },
  { word: '状元', replacement: '优秀学生', type: 'replace' },
  { word: '学霸', replacement: '优秀学生', type: 'replace' },
  { word: '学渣', replacement: '学习中', type: 'replace' },
  { word: '提分', replacement: '提升', type: 'replace' },
  { word: '100分', replacement: '高分', type: 'replace' },
  { word: '政府', replacement: '政`府', type: 'replace' },
  { word: '政策', replacement: '政`策', type: 'replace' },
  { word: '官方', replacement: '官`方', type: 'replace' },
  { word: '免费', replacement: '免`费', type: 'replace' },
  { word: '其它', replacement: '其他', type: 'replace' },
  { word: '私信', replacement: '私', type: 'replace' },
  { word: '课程', replacement: '课', type: 'replace' },
].sort((a, b) => b.word.length - a.word.length);

// 高危词：null 表示动态生成（字之间加 `）
function getReplacement(pattern) {
  if (pattern.replacement !== null) return pattern.replacement;
  return pattern.word.split('').join('`');
}

// 百分比模式 & 夸张表述模式
const PERCENT_PATTERN = /\d+(\.\d+)?%/g;
const EXAGGERATION = ['.*爆$', '.*疯$', '抢.*', '秒杀', '疯抢', '狂甩', '血亏', '血赚'];

// ==================== 核心：单次扫描，贪心选最长匹配 ====================

function filterTextNode(textNode, modifications) {
  let text = textNode.textContent;
  if (!text || text.trim() === '') return;

  // 第1步：收集原文中所有可能的匹配（位置 + 词条）
  let allMatches = [];

  // 固定词条匹配
  ALL_PATTERNS.forEach(p => {
    let idx = 0;
    while ((idx = text.indexOf(p.word, idx)) !== -1) {
      allMatches.push({
        start: idx,
        end: idx + p.word.length,
        original: p.word,
        replacement: getReplacement(p),
        type: p.type,
        len: p.word.length
      });
      idx += p.word.length;
    }
  });

  // 百分比匹配
  let pct;
  while ((pct = PERCENT_PATTERN.exec(text)) !== null) {
    allMatches.push({
      start: pct.index,
      end: pct.index + pct[0].length,
      original: pct[0],
      replacement: pct[0].split('').join(' '),
      type: 'low',
      len: pct[0].length
    });
  }

  // 夸张表述匹配
  EXAGGERATION.forEach(expr => {
    let re = new RegExp(expr, 'g');
    let m;
    while ((m = re.exec(text)) !== null) {
      allMatches.push({
        start: m.index,
        end: m.index + m[0].length,
        original: m[0],
        replacement: m[0].split('').join(' '),
        type: 'low',
        len: m[0].length
      });
    }
  });

  if (allMatches.length === 0) return;

  // 第2步：按长度降序、同长度按位置升序排列（长词优先）
  allMatches.sort((a, b) => {
    if (b.len !== a.len) return b.len - a.len;
    return a.start - b.start;
  });

  // 第3步：贪心选择不重叠的匹配（长词优先）
  let occupied = new Set();
  let selected = [];

  allMatches.forEach(m => {
    let conflict = false;
    for (let i = m.start; i < m.end; i++) {
      if (occupied.has(i)) { conflict = true; break; }
    }
    if (!conflict) {
      for (let i = m.start; i < m.end; i++) occupied.add(i);
      selected.push(m);
      modifications.push({ original: m.original, replacement: m.replacement, type: m.type });
    }
  });

  if (selected.length === 0) return;

  // 第4步：按起始位置降序排列，从后往前替换
  selected.sort((a, b) => b.start - a.start);

  // 第5步：构建 DocumentFragment
  let frag = document.createDocumentFragment();
  let cursor = text.length;

  selected.forEach(m => {
    if (cursor > m.end) {
      frag.insertBefore(document.createTextNode(text.substring(m.end, cursor)), frag.firstChild);
    }
    let span = document.createElement('span');
    span.className = 'highlight-' + m.type;
    span.dataset.original = m.original;
    span.textContent = m.replacement;
    frag.insertBefore(span, frag.firstChild);
    cursor = m.start;
  });

  if (cursor > 0) {
    frag.insertBefore(document.createTextNode(text.substring(0, cursor)), frag.firstChild);
  }

  if (textNode.parentNode) textNode.parentNode.replaceChild(frag, textNode);
}

function filterDOM(node, modifications) {
  if (node.nodeType === 3) {
    filterTextNode(node, modifications);
  } else if (node.nodeType === 1) {
    if (node.classList && (
      node.classList.contains('highlight-high') ||
      node.classList.contains('highlight-low') ||
      node.classList.contains('highlight-replace')
    )) return;
    let kids = Array.from(node.childNodes);
    kids.forEach(c => filterDOM(c, modifications));
  }
}

// ==================== UI交互逻辑 ====================

let debounceTimer = null;

function onInputChange() {
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(() => {
    processFilter();
  }, 300);
}

function processFilter() {
  const inputArea = document.getElementById('inputArea');
  const outputArea = document.getElementById('outputArea');

  const text = inputArea.innerText || '';

  if (!text.trim()) {
    outputArea.innerHTML = '<span style="color:#999">过滤后的文字将在这里显示...</span>';
    updateStats(0, 0, 0);
    return;
  }

  // 保存原始HTML结构（保留格式）
  let tempDiv = document.createElement('div');
  tempDiv.innerHTML = inputArea.innerHTML;

  // 收集修改记录
  let modifications = [];

  // 过滤DOM（保留格式，只改文字）
  filterDOM(tempDiv, modifications);

  // 设置到右侧（保留格式）
  outputArea.innerHTML = tempDiv.innerHTML;

  // 统计
  let highCount = modifications.filter(m => m.type === 'high').length;
  let lowCount = modifications.filter(m => m.type === 'low').length;
  let replaceCount = modifications.filter(m => m.type === 'replace').length;
  updateStats(highCount, lowCount, replaceCount);

  // 保存结果供复制使用（纯文本，不带HTML标签）
  outputArea.dataset.plainText = outputArea.innerText || '';
  outputArea.dataset.modifications = JSON.stringify(modifications);
}

function updateStats(high, low, replace) {
  document.getElementById('highCount').textContent = high;
  document.getElementById('lowCount').textContent = low;
  document.getElementById('replaceCount').textContent = replace;

  const inputText = document.getElementById('inputArea').innerText || '';
  const outputText = document.getElementById('outputArea').innerText || '';
  document.getElementById('inputCount').textContent = inputText.length + ' 字';
  document.getElementById('outputCount').textContent = outputText.length + ' 字';
}

function copyResult() {
  const outputArea = document.getElementById('outputArea');
  const text = outputArea.dataset.plainText || outputArea.innerText || '';

  if (!text.trim()) {
    showToast('没有可复制的内容', 'error');
    return;
  }

  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(() => {
      showToast('✅ 已复制到剪贴板', 'success');
    }).catch(() => {
      fallbackCopy(text);
    });
  } else {
    fallbackCopy(text);
  }
}

function fallbackCopy(text) {
  const textarea = document.createElement('textarea');
  textarea.value = text;
  document.body.appendChild(textarea);
  textarea.select();
  document.execCommand('copy');
  document.body.removeChild(textarea);
  showToast('✅ 已复制到剪贴板', 'success');
}

function exportText() {
  const outputArea = document.getElementById('outputArea');
  const text = outputArea.dataset.plainText || outputArea.innerText || '';

  if (!text.trim()) {
    showToast('没有可导出的内容', 'error');
    return;
  }

  const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = '过滤后文字_' + new Date().getTime() + '.txt';
  a.click();
  URL.revokeObjectURL(url);

  showToast('✅ 已导出文本文件', 'success');
}

function showDetail() {
  const outputArea = document.getElementById('outputArea');
  const modifications = JSON.parse(outputArea.dataset.modifications || '[]');

  if (modifications.length === 0) {
    showToast('没有检测到需要过滤的词汇', 'error');
    return;
  }

  let html = '<p style="margin-bottom:12px;color:#666;">共检测到 <strong>' + modifications.length + '</strong> 处需要处理的词汇：</p>';

  const grouped = {
    high: modifications.filter(m => m.type === 'high'),
    low: modifications.filter(m => m.type === 'low'),
    replace: modifications.filter(m => m.type === 'replace')
  };

  if (grouped.high.length > 0) {
    html += '<h4 style="color:#ff6b6b;margin:12px 0 8px;">🔴 高危词处理（' + grouped.high.length + '处）</h4>';
    grouped.high.forEach(m => {
      html += '<div style="padding:8px;background:#fff5f5;border-left:3px solid #ff6b6b;margin-bottom:8px;border-radius:4px;">';
      html += '<strong>' + escapeHtml(m.original) + '</strong> → <span style="color:#ff6b6b;">' + escapeHtml(m.replacement) + '</span>';
      html += '</div>';
    });
  }

  if (grouped.low.length > 0) {
    html += '<h4 style="color:#feca57;margin:12px 0 8px;">🟡 低风险词处理（' + grouped.low.length + '处）</h4>';
    grouped.low.forEach(m => {
      html += '<div style="padding:8px;background:#fff9e6;border-left:3px solid #feca57;margin-bottom:8px;border-radius:4px;">';
      html += '<strong>' + escapeHtml(m.original) + '</strong> → <span style="color:#f39c12;">' + escapeHtml(m.replacement) + '</span>';
      html += '</div>';
    });
  }

  if (grouped.replace.length > 0) {
    html += '<h4 style="color:#48dbfb;margin:12px 0 8px;">🔵 同义词替换（' + grouped.replace.length + '处）</h4>';
    grouped.replace.forEach(m => {
      html += '<div style="padding:8px;background:#e8f9fd;border-left:3px solid #48dbfb;margin-bottom:8px;border-radius:4px;">';
      html += '<strong>' + escapeHtml(m.original) + '</strong> → <span style="color:#0abde3;">' + escapeHtml(m.replacement) + '</span>';
      html += '</div>';
    });
  }

  document.getElementById('detailContent').innerHTML = html;
  document.getElementById('detailModal').classList.add('active');
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

function closeDetail() {
  document.getElementById('detailModal').classList.remove('active');
}

function clearAll() {
  document.getElementById('inputArea').innerHTML = '';
  document.getElementById('outputArea').innerHTML = '<span style="color:#999">过滤后的文字将在这里显示...</span>';
  updateStats(0, 0, 0);
  showToast('✅ 已清空', 'success');
}

function showToast(message, type) {
  const toast = document.getElementById('toast');
  toast.textContent = message;
  toast.className = 'toast toast-' + type;
  setTimeout(() => toast.classList.add('show'), 10);
  setTimeout(() => toast.classList.remove('show'), 3000);
}

// 点击模态框外部关闭
document.getElementById('detailModal').addEventListener('click', function(e) {
  if (e.target === this) closeDetail();
});

// 初始化
document.getElementById('outputArea').innerHTML = '<span style="color:#999">过滤后的文字将在这里显示...</span>';

// 可编辑的结果区域
document.getElementById('outputArea').addEventListener('input', function() {
  this.dataset.plainText = this.innerText || '';
});

// 绑定输入事件
document.getElementById('inputArea').addEventListener('input', onInputChange);
